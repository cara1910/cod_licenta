<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resetare parolă</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="hero-content">
        <div class="hero-title">RESETARE PAROLĂ</div>
        <div class="hero-subtitle">Setează o parolă nouă pentru contul tău și revino la supraveghere.</div>
      </div>
    </section>

    <section class="login-panel">
      <div class="login-header">
        <div class="login-icon">🔒</div>
        <div class="login-heading">RESETARE PAROLĂ</div>
        <p class="login-text">Introdu adresa de email și parola nouă pentru a-ți actualiza accesul.</p>
      </div>

      <form class="form" method="POST">
        <div class="input-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Email" required />
        </div>

        <div class="input-group">
          <label for="new-password">Parolă nouă</label>
          <input id="new-password" name="new_password" type="password" placeholder="Parolă nouă" required />
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirmă parola</label>
          <input id="confirm-password" name="confirm_password" type="password" placeholder="Confirmă parola" required />
        </div>

        <div class="helper-row">
          <span></span>
          <a href="{{ url_for('home') }}">Înapoi la login</a>
        </div>

        <button type="submit" class="login-button">RESETEAZĂ PAROLA</button>
      </form>
     

      <p class="note">După resetare, folosește noua parolă pentru a te autentifica în aplicația de supraveghere.</p>
    </section>
  </div>
</body>
</html>
